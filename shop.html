<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban DZ | Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
--main:#F3E9D5;
--dark:#51443A;
--card:#5a4c41;
--border:#6a5a4d;
--text:#F3E9D5;
}

body{
margin:0;
font-family:Cairo;
background:var(--dark);
color:var(--text);
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px;
border-bottom:1px solid var(--border);
}

.logo span{color:var(--main)}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:var(--card);
padding:15px;
border-radius:8px;
border:1px solid var(--border);
}

.buy{
margin-top:10px;
display:block;
text-align:center;
border:1px solid var(--border);
padding:10px;
cursor:pointer;
}

.buy:hover{
background:var(--main);
color:#000;
}
</style>
</head>

<body>

<nav>
<div class="logo">URBAN <span>DZ</span></div>
<a href="index.html">🏠</a>
</nav>

<h2 style="padding:20px;">كل المنتجات</h2>

<section class="products">

<div class="card">
<h3>هودي أسود</h3>
<p>4500 دج</p>
<div class="buy" onclick="order('هودي أسود',4500)">طلب</div>
</div>

<div class="card">
<h3>سويت شيرت</h3>
<p>3800 دج</p>
<div class="buy" onclick="order('سويت شيرت',3800)">طلب</div>
</div>

<div class="card">
<h3>بنطلون</h3>
<p>3000 دج</p>
<div class="buy" onclick="order('بنطلون',3000)">طلب</div>
</div>

<div class="card">
<h3>تيشرت</h3>
<p>2500 دج</p>
<div class="buy" onclick="order('تيشرت',2500)">طلب</div>
</div>

</section>

<script>
function order(name,price){
let msg=`طلب ${name} السعر ${price}`;
window.open(`https://wa.me/213559049058?text=${msg}`);
}
</script>

</body>
</html>
