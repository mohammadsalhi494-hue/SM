<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Urban DZ | المتجر</title>
  <style>
    :root { --caramel: #c8a96e; --dark: #080808; }
    body { background: var(--dark); color: white; font-family: sans-serif; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
    .card { background: #1a1a1a; padding: 15px; border-radius: 10px; }
    .details-btn { background: transparent; border: 1px solid var(--caramel); color: var(--caramel); padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; }
    .buy-btn { background: var(--caramel); border: none; padding: 10px; width: 100%; margin-top: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="product-grid">
    
    <div class="card">
      <img src="images/12f09fb0d69cc48b1524f6d3bf8caab2.jpg" width="100%" height="200px" style="object-fit:cover;">
      <h3>هودي رمادي فاتح</h3>
      <button class="details-btn" onclick="showModal('هودي رمادي فاتح', 'هودي واسع (Oversized) يعطي إطلالة شبابية، مريح جداً في الحركة ومناسب لكل الفصول.')">التفاصيل</button>
      <button class="buy-btn">طلب الآن</button>
    </div>

    <div class="card">
      <img src="images/9b0681c634d72d8ab880fd4091dba21a.jpg" width="100%" height="200px" style="object-fit:cover;">
      <h3>سويت شيرت كحلي</h3>
      <button class="details-btn" onclick="showModal('سويت شيرت كحلي', 'تصميم كلاسيكي بسيط وأنيق، مصنوع من ألياف دقيقة تضمن عدم تغير اللون بعد الغسيل.')">التفاصيل</button>
      <button class="buy-btn">طلب الآن</button>
    </div>

  </div>

  <script>
    function showModal(name, desc) { alert("المنتج: " + name + "\n\nالوصف: " + desc); }
  </script>
</body>
</html>
