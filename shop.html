<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
:root{
--main:#F3E9D5;
--dark:#51443A;
--card:#5a4c41;
--border:#6a5a4d;
--text:#F3E9D5;
}

body{
margin:0;
background:var(--dark);
color:var(--text);
font-family:sans-serif;
}

nav{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid var(--border);
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:var(--card);
padding:10px;
border-radius:10px;
border:1px solid var(--border);
}

.card img{
width:100%;
border-radius:8px;
}

.buy{
margin-top:10px;
text-align:center;
padding:8px;
border:1px solid var(--border);
cursor:pointer;
}

.buy:hover{
background:var(--main);
color:#000;
}
</style>
</head>

<body>

<nav>
<div>URBAN DZ</div>
<a href="index.html">🏠</a>
</nav>

<h2 style="padding:20px;">كل المنتجات</h2>

<section class="products">

<div class="card">
<img src="images/12f09fb0d69cc48b1524f6d3bf8caab2.jpg">
<h3>هودي</h3>
<p>4500 دج</p>
<div class="buy" onclick="order('هودي',4500)">طلب</div>
</div>

<div class="card">
<img src="images/9b0681c634d72d8ab880fd4091dba21a.jpg">
<h3>هودي آخر</h3>
<p>4200 دج</p>
<div class="buy" onclick="order('هودي',4200)">طلب</div>
</div>

<div class="card">
<img src="images/f13d461a52de34f9b012cc64366238bf.jpg">
<h3>بنطلون</h3>
<p>3000 دج</p>
<div class="buy" onclick="order('بنطلون',3000)">طلب</div>
</div>

<div class="card">
<img src="images/e906a4192df53b015be23eca79dcf1ed.jpg">
<h3>ستايل جديد</h3>
<p>3500 دج</p>
<div class="buy" onclick="order('منتج',3500)">طلب</div>
</div>

<div class="card">
<img src="images/823039fe5e5030e66798f11e69823ee0.jpg">
<h3>لووك كامل</h3>
<p>6000 دج</p>
<div class="buy" onclick="order('لووك',6000)">طلب</div>
</div>

</section>

<script>
function order(name,price){
let msg=`طلب ${name} السعر ${price}`;
window.open(`https://wa.me/213559049058?text=${msg}`);
}
</script>

</body>
</html>
