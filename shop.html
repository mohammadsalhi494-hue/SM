<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر Urban DZ | المنتجات</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; color: #00ff9d; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 600px; margin: auto; }
        .card { background: #161616; padding: 10px; border-radius: 12px; border: 1px solid #333; }
        img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .buy-btn { background: #00ff9d; color: black; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>مجموعتنا الكاملة</h1>
    <div class="grid">
        <div class="card"><img src="12f09fb0d69cc48b1524f6d3bf8caab2.jpg"><button class="buy-btn" onclick="openOrderForm('المنتج 1', 4500)">طلب الآن</button></div>
        <div class="card"><img src="9b0681c634d72d8ab880fd4091dba21a.jpg"><button class="buy-btn" onclick="openOrderForm('المنتج 2', 5000)">طلب الآن</button></div>
        <div class="card"><img src="f13d461a52de34f9b012cc64366238bf.jpg"><button class="buy-btn" onclick="openOrderForm('المنتج 3', 3900)">طلب الآن</button></div>
        <div class="card"><img src="34f69334ae9678325b0f2e81120417e9.jpg"><button class="buy-btn" onclick="openOrderForm('المنتج 4', 3800)">طلب الآن</button></div>
        <div class="card"><img src="e906a4192df53b015be23eca79dcf1ed.jpg"><button class="buy-btn" onclick="openOrderForm('المنتج 5', 4200)">طلب الآن</button></div>
        <div class="card"><img src="6b8928a16d0de61fd3f61f15b06c9c65.jpg"><button class="buy-btn" onclick="openOrderForm('المنتج 6', 4000)">طلب الآن</button></div>
        <div class="card"><img src="823039fe5e5030e66798f11e69823ee0.jpg"><button class="buy-btn" onclick="openOrderForm('المنتج 7', 3500)">طلب الآن</button></div>
    </div>

    <script>
        function openOrderForm(product, price) {
            let name = prompt("الاسم واللقب:");
            let phone = prompt("رقم الهاتف:");
            let state = prompt("الولاية:");
            let qty = prompt("العدد:");
            if (name && phone && state && qty) {
                let msg = `طلب جديد: ${product}%0Aالسعر: ${price} دج%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aالولاية: ${state}%0Aالكمية: ${qty}`;
                window.open(`https://wa.me/213559049058?text=${msg}`, '_blank');
            }
        }
    </script>
</body>
</html>
