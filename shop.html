<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban DZ | المتجر</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #51443A;
      --bg: #F3E9D5;
      --card: #ffffff;
      --border: #E0D5C5;
      --text: #51443A;
      --muted: #8c7e72;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; }

    /* TICKER */
    .ticker-wrap { background: var(--primary); overflow: hidden; white-space: nowrap; padding: 8px 0; }
    .ticker-inner { display: inline-flex; animation: ticker 20s linear infinite; }
    .ticker-inner span { font-family: 'Bebas Neue', cursive; font-size: 1rem; letter-spacing: 3px; padding: 0 30px; color: #fff; }
    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* NAV */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 40px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: rgba(243, 233, 213, 0.95);
      backdrop-filter: blur(10px); z-index: 100;
    }
    .nav-logo { font-family: 'Bebas Neue', cursive; font-size: 2rem; color: var(--primary); letter-spacing: 2px; text-decoration: none; }
    .nav-logo span { color: var(--primary); }
    .nav-links { display: flex; gap: 30px; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 600; }
    .nav-links a:hover, .nav-links a.active { color: var(--primary); }
    .cart-btn {
      background: var(--primary); color: #fff; border: none; padding: 8px 20px;
      border-radius: 4px; font-family: 'Cairo', sans-serif; font-weight: 700; cursor: pointer;
    }

    /* PAGE HEADER */
    .page-header { padding: 50px 40px 30px; border-bottom: 1px solid var(--border); }
    .page-header h1 { font-family: 'Bebas Neue', cursive; font-size: 3.5rem; color: var(--primary); }

    /* SHOP LAYOUT */
    .shop-layout { display: grid; grid-template-columns: 240px 1fr; gap: 0; }
    .sidebar { border-left: 1px solid var(--border); padding: 30px 25px; }
    .filter-title { color: var(--muted); font-size: 0.8rem; margin-bottom: 15px; text-transform: uppercase; }
    .filter-tag { border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; margin: 5px; cursor: pointer; background: none; }
    .filter-tag.active { border-color: var(--primary); color: var(--primary); }

    /* PRODUCT GRID */
    .shop-main { padding: 25px 35px; }
    .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .product-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 10px; }
    .product-price { color: var(--primary); font-weight: 700; }
    .quick-buy { background: var(--primary); color: #fff; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 6px; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; padding: 35px; border-radius: 12px; width: 400px; color: var(--text); }
    .modal input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); }
    .modal-confirm { background: var(--primary); color: #fff; padding: 10px; width: 100%; border: none; cursor: pointer; }
  </style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-inner">
    <span>URBAN DZ</span><span>✦</span><span>MADE IN ALGERIA</span><span>✦</span>
  </div>
</div>

<nav>
  <a href="index.html" class="nav-logo">URBAN <span>DZ</span></a>
  <ul class="nav-links">
    <li><a href="index.html">الرئيسية</a></li>
    <li><a href="shop.html" class="active">المتجر</a></li>
  </ul>
  <button class="cart-btn">🛒 السلة</button>
</nav>

<div class="page-header">
  <h1>المنتجات <span>الجديدة</span></h1>
</div>

<div class="shop-layout">
  <aside class="sidebar">
    <div class="filter-title">القسم</div>
    <button class="filter-tag active">الكل</button>
    <button class="filter-tag">HOMME</button>
  </aside>

  <main class="shop-main">
    <div class="products-grid" id="productsGrid">
      <div class="product-card">
        <div class="product-name">هودي واسع - رمادي</div>
        <div class="product-price">4500 دج</div>
        <button class="quick-buy" onclick="openModal('هودي واسع', 4500)">طلب الآن</button>
      </div>
      </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>طلب سريع 🛍️</h3>
    <input type="text" id="orderName" placeholder="الاسم واللقب">
    <input type="text" id="orderPhone" placeholder="رقم الهاتف">
    <button class="modal-confirm" onclick="confirmOrder()">إرسال واتساب</button>
  </div>
</div>

<script>
  function openModal(name, price) {
    document.getElementById('modalOverlay').classList.add('open');
  }
  function confirmOrder() {
    alert("تم الطلب!");
    document.getElementById('modalOverlay').classList.remove('open');
  }
</script>
</body>
</html>
