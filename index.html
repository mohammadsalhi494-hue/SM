<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban DZ | الرئيسية</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #51443A; /* البني الجديد */
      --bg: #F3E9D5;      /* الكريمي الجديد */
      --dark: #080808;
      --card: #ffffff;
      --border: #E0D5C5;
      --text: #51443A;    /* البني للنصوص */
      --muted: #8c7e72;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      overflow-x: hidden;
    }

    /* ===== TICKER ===== */
    .ticker-wrap {
      background: var(--primary);
      color: #fff;
      overflow: hidden;
      white-space: nowrap;
      padding: 8px 0;
    }
    .ticker-inner {
      display: inline-flex;
      animation: ticker 20s linear infinite;
    }
    .ticker-inner span {
      font-family: 'Bebas Neue', cursive;
      font-size: 1rem;
      letter-spacing: 3px;
      padding: 0 30px;
    }
    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ===== NAV ===== */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(243, 233, 213, 0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 2rem;
      color: var(--primary);
      letter-spacing: 2px;
    }
    .nav-logo span { color: var(--primary); }
    .nav-links {
      display: flex;
      gap: 30px;
      list-style: none;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--primary); }
    .cart-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 4px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      cursor: pointer;
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 90vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 60px 40px;
    }
    .hero-badge {
      background: var(--primary);
      color: white;
      padding: 5px 14px;
      font-size: 0.7rem;
      margin-bottom: 20px;
      display: inline-block;
    }
    .hero-title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(4rem, 8vw, 7rem);
      line-height: 0.95;
      color: var(--primary);
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      padding: 14px 35px;
      text-decoration: none;
      font-weight: 700;
      border-radius: 4px;
      display: inline-block;
    }

    /* ===== PRODUCTS ===== */
    .product-card {
      background: white;
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 10px;
    }
    .product-price { color: var(--primary); font-weight: 700; }
    .product-buy {
      background: white;
      border: 2px solid var(--primary);
      color: var(--primary);
      width: 100%;
      padding: 10px;
      cursor: pointer;
      margin-top: 10px;
    }
    .product-buy:hover { background: var(--primary); color: white; }

    /* ===== FOOTER ===== */
    footer {
      background: var(--primary);
      color: #fff;
      padding: 50px 40px;
      margin-top: 50px;
    }
    
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hero { grid-template-columns: 1fr; text-align: center; }
    }
  </style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-inner">
    <span>URBAN DZ</span><span>✦</span><span>MADE IN ALGERIA</span><span>✦</span>
    <span>STYLE STARTS HERE</span><span>✦</span><span>SHOP NOW</span><span>✦</span>
  </div>
</div>

<nav>
  <div class="nav-logo">URBAN DZ</div>
  <ul class="nav-links">
    <li><a href="#" class="active">الرئيسية</a></li>
    <li><a href="#">المتجر</a></li>
  </ul>
  <button class="cart-btn" onclick="window.location='shop.html'">🛒 السلة</button>
</nav>

<section class="hero">
  <div class="hero-text">
    <div class="hero-badge">MADE IN ALGERIA</div>
    <h1 class="hero-title">URBAN<br>DZ</h1>
    <p>أفضل تصاميم الملابس العصرية في الجزائر</p>
    <br>
    <a href="shop.html" class="btn-primary">تسوق الآن</a>
  </div>
</section>

<footer>
  <p>© 2025 Urban DZ — جميع الحقوق محفوظة</p>
</footer>

<script>
  function openOrder(productName, price) {
    let name = prompt("الاسم واللقب:");
    if (!name) return;
    let phone = prompt("رقم الهاتف:");
    if (!phone) return;
    let msg = `طلب جديد! %0Aالمنتج: ${productName}%0Aالسعر: ${price} دج%0Aالاسم: ${name}%0Aالهاتف: ${phone}`;
    window.open(`https://wa.me/213559049058?text=${msg}`, '_blank');
  }
</script>
</body>
</html>
