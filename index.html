<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Urban DZ | الرئيسية</title>
  <style>
    :root { --caramel: #c8a96e; --dark: #080808; --card: #111111; --text: #f0f0f0; }
    body { background: var(--dark); color: var(--text); font-family: sans-serif; margin: 0; }
    .ticker-wrap { background: var(--caramel); color: #000; padding: 10px; text-align: center; font-weight: bold; }
    nav { display: flex; justify-content: space-between; padding: 20px 40px; border-bottom: 1px solid #333; }
    .btn-primary { background: var(--caramel); color: #000; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
    .product-card { background: var(--card); padding: 15px; border-radius: 10px; width: 250px; }
    .details-btn { background: transparent; border: 1px solid var(--caramel); color: var(--caramel); padding: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
    .details-btn:hover { background: var(--caramel); color: #000; }
  </style>
</head>
<body>
  <div class="ticker-wrap">URBAN DZ | التوصيل متوفر لجميع ولايات الوطن</div>
  <nav>
    <div style="font-size: 1.5rem; font-weight: bold;">URBAN <span style="color:var(--caramel)">DZ</span></div>
    <div>
      <a href="index.html" style="color:white; margin:0 10px;">الرئيسية</a>
      <a href="shop.html" style="color:white;">المتجر</a>
    </div>
  </nav>

  <section style="padding: 50px; text-align: center;">
    <h1>مرحباً بك في <span style="color:var(--caramel)">URBAN DZ</span></h1>
    <p>تصاميم جزائرية بجودة عالمية</p>
    <a href="shop.html" class="btn-primary">تصفح المنتجات</a>
  </section>

  <div style="display:flex; gap:20px; justify-content:center; flex-wrap:wrap;">
    <div class="product-card">
      <img src="images/f13d461a52de34f9b012cc64366238bf.jpg" width="100%" height="200px" style="object-fit:cover;">
      <h3>تراكسوت Urban DZ</h3>
      <button class="details-btn" onclick="alert('تراكسوت رياضي بتصميم Urban عصري، مصنوع من القطن الثقيل عالي الجودة ليمنحك الراحة والدفء في الأيام الباردة.')">التفاصيل</button>
      <button class="btn-primary" style="width:100%; margin-top:10px;">طلب الآن</button>
    </div>
  </div>
</body>
</html>
