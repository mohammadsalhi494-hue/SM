<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban DZ</title>

<style>
:root{
--main:#F3E9D5;
--dark:#51443A;
--card:#5a4c41;
--border:#6a5a4d;
--text:#F3E9D5;
}

body{
margin:0;
font-family:sans-serif;
background:var(--dark);
color:var(--text);
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px;
border-bottom:1px solid var(--border);
}

.logo span{color:var(--main)}

.btn{
background:var(--main);
color:#000;
padding:8px 20px;
text-decoration:none;
}

/* HERO */
.hero{
text-align:center;
padding:60px 20px;
}

.hero img{
width:200px;
border-radius:10px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:var(--card);
padding:10px;
border-radius:10px;
border:1px solid var(--border);
}

.card img{
width:100%;
border-radius:8px;
}

.buy{
margin-top:10px;
text-align:center;
padding:8px;
border:1px solid var(--border);
cursor:pointer;
}

.buy:hover{
background:var(--main);
color:#000;
}
</style>
</head>

<body>

<nav>
<div class="logo">URBAN <span>DZ</span></div>
<a href="shop.html" class="btn">SHOP</a>
</nav>

<section class="hero">
<h1>ستايل يبدأ من هنا</h1>
<img src="images/12f09fb0d69cc48b1524f6d3bf8caab2.jpg">
</section>

<section class="products">

<div class="card">
<img src="images/34f69334ae9678325b0f2e81120417e9.jpg">
<h3>سويت شيرت</h3>
<p>3800 دج</p>
<div class="buy" onclick="order('سويت شيرت',3800)">طلب</div>
</div>

<div class="card">
<img src="images/6b8928a16d0de61fd3f61f15b06c9c65.jpg">
<h3>تيشرت</h3>
<p>2500 دج</p>
<div class="buy" onclick="order('تيشرت',2500)">طلب</div>
</div>

</section>

<script>
function order(name,price){
let msg=`طلب ${name} السعر ${price}`;
window.open(`https://wa.me/213559049058?text=${msg}`);
}
</script>

</body>
</html>
